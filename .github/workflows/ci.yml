name: ESP32 CI Pipeline

on:
  push:
  pull_request:

jobs:

  firmware-build:
    name: Build ESP32 Firmware
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build Main Firmware
        run: platformio run -e freenove_esp32_s3_wroom


  native-tests:
    name: Native Logic Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install PlatformIO
        run: pip install platformio

      - name: Run Native Tests
        run: platformio test -e native


  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install PlatformIO
        run: pip install platformio

      - name: Run PlatformIO Check
        run: platformio check -e freenove_esp32_s3_wroom


  queue-validation:
    name: Queue Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install PlatformIO
        run: pip install platformio

      - name: Compile Queue Tests
        run: platformio test -e esp32-test -f test_rtos_queues --without-uploading


  semaphore-validation:
    name: Semaphore Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install PlatformIO
        run: pip install platformio

      - name: Compile Semaphore Tests
        run: platformio test -e esp32-test -f test_rtos_semaphores --without-uploading


  mutex-validation:
    name: Mutex Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install PlatformIO
        run: pip install platformio

      - name: Compile Mutex Tests
        run: platformio test -e esp32-test -f test_rtos_mutexes --without-uploading


  task-validation:
    name: Task Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install PlatformIO
        run: pip install platformio

      - name: Compile Task Tests
        run: platformio test -e esp32-test -f test_rtos_tasks --without-uploading


  timing-validation:
    name: Timing Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install PlatformIO
        run: pip install platformio

      - name: Compile Timing Tests
        run: platformio test -e esp32-test -f test_timing --without-uploading


  multicore-validation:
    name: Multicore Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install PlatformIO
        run: pip install platformio

      - name: Compile Multicore Tests
        run: platformio test -e esp32-test -f test_multicore --without-uploading


  hardware-init-validation:
    name: Hardware Init Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install PlatformIO
        run: pip install platformio

      - name: Compile Hardware Init Tests
        run: platformio test -e esp32-test -f test_hardware_init --without-uploading


  fault-injection-validation:
    name: Fault Injection Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install PlatformIO
        run: pip install platformio

      - name: Compile Fault Injection Tests
        run: platformio test -e esp32-test -f test_fault_injection --without-uploading


  stress-validation:
    name: Stress Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install PlatformIO
        run: pip install platformio

      - name: Compile Stress Tests
        run: platformio test -e stress-test --without-uploading


  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest

    needs:
      - firmware-build
      - native-tests
      - static-analysis
      - queue-validation
      - semaphore-validation
      - mutex-validation
      - task-validation
      - timing-validation
      - multicore-validation
      - hardware-init-validation
      - fault-injection-validation
      - stress-validation

    steps:
      - name: Final CI Status
        run: echo "All validation stages passed successfully."