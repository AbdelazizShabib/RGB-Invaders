name: ESP32 Enterprise CI Pipeline

on:
  push:
  pull_request:

jobs:

  # =============================================================================
  # ROOT BUILD STAGE
  # =============================================================================

  firmware-build:
    name: Build ESP32 Firmware
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-pio

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build Main Firmware
        run: platformio run -e freenove_esp32_s3_wroom


  # =============================================================================
  # CORE VALIDATION LAYER
  # =============================================================================

  native-tests:
    name: Native Logic Tests
    runs-on: ubuntu-latest

    needs:
      - firmware-build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-pio

      - run: pip install platformio

      - name: Run Native Unit Tests
        run: platformio test -e native


  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    needs:
      - firmware-build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-pio

      - run: pip install platformio

      - name: Run Static Analysis
        run: platformio check -e freenove_esp32_s3_wroom


  # =============================================================================
  # RTOS VALIDATION LAYER (PARALLEL)
  # =============================================================================

  queue-validation:
    name: Queue Validation
    runs-on: ubuntu-latest

    needs:
      - firmware-build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-pio

      - run: pip install platformio

      - name: Compile Queue Validation Suite
        run: platformio run -e esp32-test


  semaphore-validation:
    name: Semaphore Validation
    runs-on: ubuntu-latest

    needs:
      - firmware-build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-pio

      - run: pip install platformio

      - name: Compile Semaphore Validation Suite
        run: platformio run -e esp32-test


  mutex-validation:
    name: Mutex Validation
    runs-on: ubuntu-latest

    needs:
      - firmware-build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-pio

      - run: pip install platformio

      - name: Compile Mutex Validation Suite
        run: platformio run -e esp32-test


  task-validation:
    name: Task Validation
    runs-on: ubuntu-latest

    needs:
      - firmware-build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-pio

      - run: pip install platformio

      - name: Compile Task Validation Suite
        run: platformio run -e esp32-test


  # =============================================================================
  # SYSTEM VALIDATION LAYER
  # =============================================================================

  timing-validation:
    name: Timing Validation
    runs-on: ubuntu-latest

    needs:
      - queue-validation
      - semaphore-validation

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-pio

      - run: pip install platformio

      - name: Compile Timing Validation Suite
        run: platformio run -e esp32-test


  multicore-validation:
    name: Multicore Validation
    runs-on: ubuntu-latest

    needs:
      - mutex-validation
      - task-validation

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-pio

      - run: pip install platformio

      - name: Compile Multicore Validation Suite
        run: platformio run -e esp32-test


  hardware-init-validation:
    name: Hardware Init Validation
    runs-on: ubuntu-latest

    needs:
      - queue-validation
      - task-validation

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-pio

      - run: pip install platformio

      - name: Compile Hardware Initialization Suite
        run: platformio run -e esp32-test


  # =============================================================================
  # RELIABILITY VALIDATION LAYER
  # =============================================================================

  fault-injection-validation:
    name: Fault Injection Validation
    runs-on: ubuntu-latest

    needs:
      - timing-validation
      - multicore-validation
      - hardware-init-validation

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-pio

      - run: pip install platformio

      - name: Compile Fault Injection Suite
        run: platformio run -e esp32-test


  stress-validation:
    name: Stress Validation
    runs-on: ubuntu-latest

    needs:
      - fault-injection-validation

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-pio

      - run: pip install platformio

      - name: Compile Stress Validation Suite
        run: platformio run -e stress-test


  # =============================================================================
  # FINAL GATE
  # =============================================================================

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest

    needs:
      - native-tests
      - static-analysis
      - stress-validation

    steps:
      - name: Final Validation Gate
        run: echo "All validation stages completed successfully."