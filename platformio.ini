; PlatformIO Project Configuration File
;
; https://docs.platformio.org/page/projectconf.html

; =============================================================================
; MAIN GAME FIRMWARE ENVIRONMENT
; =============================================================================
[env:freenove_esp32_s3_wroom]
platform = espressif32
board = freenove_esp32_s3_wroom
framework = arduino

monitor_speed = 115200

build_flags =
    -std=gnu++17

lib_deps =
    fastled/FastLED
    adafruit/Adafruit SSD1306
    adafruit/Adafruit GFX Library
    links2004/WebSockets
    bblanchon/ArduinoJson


; =============================================================================
; NATIVE HOST-SIDE TEST ENVIRONMENT
; Runs ONLY deterministic pure-logic Unity tests on the PC.
; No Arduino/ESP32/FreeRTOS code is compiled here.
;
; Run:
;   platformio test -e native
; =============================================================================
[env:native]
platform = native
test_framework = unity

build_flags =
    -std=gnu++17
    -DNATIVE_TEST=1

; CRITICAL:
; Prevent PlatformIO from compiling src/main.cpp in native CI
test_build_src = false

; EXTRA protection for GitHub Actions / clean runners
build_src_filter =
    -<src/>

; ONLY pure logic tests should run natively
test_filter =
    test_accuracy
    test_combo_color
    test_led_color_id
    test_level_score
    test_score_rank
    test_simon_stage
    test_win_condition


; =============================================================================
; ESP32 RTOS + HARDWARE VALIDATION ENVIRONMENT
; Runs ON the ESP32 hardware.
;
; Covers:
; - queues
; - semaphores
; - mutexes
; - tasks
; - timing
; - multicore validation
; - hardware init
; - fault injection
;
; Run:
;   platformio test -e esp32-test
; =============================================================================
[env:esp32-test]
platform = espressif32
board = freenove_esp32_s3_wroom
framework = arduino

monitor_speed = 115200

build_flags =
    -DTEST_BUILD=1
    -DRTOS_TEST_ENABLED=1
    -std=gnu++17

test_build_src = false

test_filter =
    test_rtos_queues
    test_rtos_semaphores
    test_rtos_mutexes
    test_rtos_tasks
    test_timing
    test_hardware_init
    test_multicore
    test_fault_injection
    test_race_condition
    test_deadlock_priority

lib_deps =
    fastled/FastLED
    adafruit/Adafruit SSD1306
    adafruit/Adafruit GFX Library
    links2004/WebSockets
    bblanchon/ArduinoJson


; =============================================================================
; ESP32 STRESS TEST ENVIRONMENT
; Runs aggressive long-duration stress validation ON hardware.
;
; Covers:
; - queue flooding
; - ISR burst handling
; - heap stability
; - mutex contention
; - recursion stress
;
; Run:
;   platformio test -e stress-test
; =============================================================================
[env:stress-test]
platform = espressif32
board = freenove_esp32_s3_wroom
framework = arduino

monitor_speed = 115200

build_flags =
    -DTEST_BUILD=1
    -DSTRESS_TESTING=1
    -std=gnu++17

test_build_src = false

test_filter =
    test_stress

lib_deps =
    fastled/FastLED
    adafruit/Adafruit SSD1306
    adafruit/Adafruit GFX Library
    links2004/WebSockets
    bblanchon/ArduinoJson