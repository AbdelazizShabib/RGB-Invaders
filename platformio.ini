; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:freenove_esp32_s3_wroom]
platform = espressif32
board = freenove_esp32_s3_wroom
framework = arduino
monitor_speed=115200

lib_deps =
    fastled/FastLED
    adafruit/Adafruit SSD1306
    adafruit/Adafruit GFX Library
    links2004/WebSockets
    bblanchon/ArduinoJson

; ---------------------------------------------------------------------------
; Native test environment — runs on the host (no hardware required).
; Only lib/game_logic is compiled; no Arduino/FastLED headers are pulled in.
; Run with:  pio test -e native
; ---------------------------------------------------------------------------
[env:native]
platform = native
test_framework = unity
build_flags =
    -std=gnu++17
    -DNATIVE_TEST=1

test_build_src = false

; ---------------------------------------------------------------------------
; ESP32 RTOS/hardware test environment — runs ON the device.
; Covers queues, semaphores, mutexes, tasks, timing, hardware init, multicore.
; Run with:  pio test -e esp32-test  (device must be connected)
; ---------------------------------------------------------------------------
[env:esp32-test]
platform = espressif32
board = freenove_esp32_s3_wroom
framework = arduino
monitor_speed = 115200
test_build_src = false
test_filter =
    test_rtos_queues
    test_rtos_semaphores
    test_rtos_mutexes
    test_rtos_tasks
    test_timing
    test_hardware_init
    test_multicore
    test_fault_injection
build_flags =
    -DTEST_BUILD=1
    -DRTOS_TEST_ENABLED=1
    -std=gnu++17
lib_deps =
    fastled/FastLED
    adafruit/Adafruit SSD1306
    adafruit/Adafruit GFX Library
    links2004/WebSockets
    bblanchon/ArduinoJson

; ---------------------------------------------------------------------------
; Stress-test environment — long-duration queue flood, ISR burst, heap watch.
; Run with:  pio test -e stress-test  (device must be connected)
; ---------------------------------------------------------------------------
[env:stress-test]
platform = espressif32
board = freenove_esp32_s3_wroom
framework = arduino
monitor_speed = 115200
test_build_src = false
test_filter = test_stress
build_flags =
    -DTEST_BUILD=1
    -DSTRESS_TESTING=1
    -std=gnu++17
lib_deps =
    fastled/FastLED
    adafruit/Adafruit SSD1306
    adafruit/Adafruit GFX Library
    links2004/WebSockets
    bblanchon/ArduinoJson